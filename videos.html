<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos - Barbería G.T.</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
    <header>
        
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="fotos.html">Fotos</a></li>
                <li><a href="videos.html">Videos</a></li>
                <li><a href="contactos.html">Contactos</a></li>
                <li><a href="historia.html">Historia</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Nuestros Videos</h2>
        <p>Tips, cortes y el día a día en la barbería</p>
        
        <!-- Aquí irán los videos -->
         <div class="galeria-videos">
    <!-- Video 1: -->
    <div class="item-video">
        <iframe 
            width="560" 
            height="315" 
            src="https://youtube.com/embed/rpOoyaMOY5Q?feature=share"
            title="Video de barbería"
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>

    <!-- Video 2: Tour por el local -->
    <div class="item-video">
        <iframe 
            width="560" 
            height="315" 
            src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
            title="Tour por la barbería"
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>
        <h3>Conoce nuestro local</h3>
        <p>Un recorrido por nuestras instalaciones</p>
    </div>

    <!-- Video 3: Tips de cuidado -->
    <div class="item-video">
        <iframe 
            width="560" 
            height="315" 
            src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
            title="Tips para tu barba"
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>
        <h3>Tips de cuidado para tu barba</h3>
        <p>Recomendaciones profesionales</p>
    </div>
</div>
        
    </main>

    <footer>
        <p>&copy; 2025 Barbería G.T. - Todos los derechos reservados</p>
    </footer>

    <script>
    const items = document.querySelectorAll('.item-video');
    items.forEach(item => {
        item.addEventListener('mouseenter', function() {
            const iframe = this.querySelector('iframe');
            const src = iframe.src;
            const id = src.split('/embed/')[1].split('?')[0];
            window.open(`https://youtube.com/watch?v=${id}`, '_blank');
        });
    });
    </script>
</body>
</html>
