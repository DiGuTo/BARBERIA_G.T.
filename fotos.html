    <div class="item-galeria">
        <img src="img/corte1.jpeg" alt="corte mohawk">
        <p>Corte mohawk</p>
    </div>
    
    <div class="item-galeria">
        <img src="img/corte2.jpeg" alt="sombra oscura">
        <p>Sombra oscura</p>

    <div class="item-galeria">
        <img src="img/local.jpeg" alt="Nuestro local">

     <div class="item-galeria">

    <div class="item-galeria">

</div>

    <script>
    // Esto hace que las fotos se agranden al hacer clic
    const imagenes = document.querySelectorAll('.item-galeria img');
    imagenes.forEach(img => {
        img.addEventListener('click', function() {
            window.open(this.src, '_blank');
        });
    });
    </script>
